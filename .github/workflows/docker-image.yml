name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'helpdesk-backend/**'
      - 'helpdesk-frontend/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      ####################################################
      # Checkout
      ####################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Setup Java
      ####################################################
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      ####################################################
      # Build Spring Boot
      ####################################################
      - name: Build Backend
        working-directory: ./helpdesk-backend
        run: mvn clean package -DskipTests

      ####################################################
      # Docker Login
      ####################################################
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ####################################################
      # Build Backend Image
      ####################################################
      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/helpdesk-backend:latest \
          ./helpdesk-backend

      ####################################################
      # Push Backend Image
      ####################################################
      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/helpdesk-backend:latest

      ####################################################
      # Build Frontend Image
      ####################################################
      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/helpdesk-frontend:latest \
          -f helpdesk-frontend/Dockerfile \
          ./helpdesk-frontend

      ####################################################
      # Push Frontend Image
      ####################################################
      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/helpdesk-frontend:latest

      ####################################################
      # Deploy to EC2
      ####################################################
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/helpdesk
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
